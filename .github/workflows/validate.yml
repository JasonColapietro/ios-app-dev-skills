name: validate

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate skill pack
        run: python3 scripts/validate_skill_pack.py .
      - name: Validate metadata template
        run: python3 scripts/validate_app_store_metadata.py templates/app-store-metadata
      - name: Preflight tools
        run: bash scripts/ios_preflight.sh || true

